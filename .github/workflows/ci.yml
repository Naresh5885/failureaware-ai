name: FailureAware AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Synthetic Benchmark Evaluation
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'DUMMY_KEY_FOR_BENCHMARK' }}
      run: |
        python evaluate_batch.py

  docker-build:
    needs: test-and-eval
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        docker build -t failureaware-ai:latest .
